# Root key = `Global` preset defaults or a ranged item prefab name from ObjectDB.
# Config options choose which Global preset auto-applies to each group: Fireball Staff, Rapidfire Staff, Reload Staff, Bow, Crossbow, and Bomb.
# Select `Off` in the matching config option to disable automatic assignment for that group.
# Bomb Auto uses overchargedBomb for throw_bomb items whose projectile has AOE or spawns an Aoe prefab on hit, and stickyDetonator otherwise.
# Explicit prefab entries inherit the matching Global preset.
# Set a prefab entry to `enabled: false` to ignore that override and use automatic fallback.
# Set `preset: none` on a prefab entry to opt out and keep the original secondary.
# You may keep multiple disabled examples for the same prefab. Only one enabled or omitted-enabled entry may exist per prefab.
#
# Common fields:
# enabled: false is only for prefab entries; it ignores that override and uses automatic fallback.
# preset: selects the prefab override preset.
# animation: secondary attack animation trigger. See SecondaryAttacks_AnimationReferences.txt for possible trigger names.
# detonateAnimation: stickyDetonator manual detonation animation trigger. Bomb launch animation cannot be overridden.
# cooldown: base seconds after the secondary actually fires. cooldownReductionFactor applies `cooldown * (1 - skillLevel / 100 * cooldownReductionFactor)`.
# durabilityFactor: weapon useDurabilityDrain multiplier.
# resourceMultiplier: copied raw attack cost multiplier; reload weapons multiply vanilla reload cost.
# ammoConsumption: ammo/item count consumed. `-1` uses the preset/runtime default.
# count: projectile/shot count, depending on the preset.
# interval: 0 fires immediately; values above 0 schedule one preset shot/projectile per interval.
# projectileSpeedFactor: source projectile speed multiplier where the preset exposes it.
# projectileScaleFactor: spawned projectile object and Projectile.m_rayRadius multiplier.
# damageFactor: projectile damage multiplier after skill/draw factors.
# Skill/adrenaline rewards are automatic: piercing uses 1x, bombs use 0x, and other count-based presets use 1/count per projectile hit.

Global:
  barrage:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 3
    count: 5 # Projectiles in the barrage.
    interval: 0.0
    damageFactor: 0.4
    spreadAngle: 25 # Total spread cone angle.
    barrageSpacing: 0.0 # Lateral spacing between projectile spawn points.

  volley:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 4
    count: 10 # Projectiles in the aimed volley.
    interval: 0.0
    projectileSpeedFactor: 1.0
    damageFactor: 0.5
    volleyRadius: 4 # Impact distribution radius around the aimed point.
    volleyArcAngleMin: 35 # Arc angle near max range.
    volleyArcAngleMax: 65 # Arc angle at close range.
    volleyMaxRange: 64 # Max aimed center range; also open-air fallback distance.

  piercing: # Uses the weapon's full primary projectile pattern; count is ignored.
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 2
    projectileSpeedFactor: 0.5
    projectileScaleFactor: 1.0
    damageFactor: 1.0
    pierceDamageDecay: 0.2 # Damage reduction after each character hit by the same projectile.

  scatter:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 3
    count: 6 # Split projectiles spawned after the first non-character hit.
    damageFactor: 0.5
    splitAngle: 45 # Total split cone angle.
    ricochetBounces: 1 # Bounces allowed for each split projectile.
    ricochetDecay: 0.2 # Speed and damage lost after each ricochet/bounce.
    ricochetRoughness: 0.1 # Randomness added to reflected directions.

  spiral:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 3
    count: 12 # Projectiles in the spiral.
    interval: 0.1
    damageFactor: 0.3
    spiralRadius: 0.05 # Spiral offset radius around the aim direction.
    spiralTurns: 3 # Spiral rotations across the burst.

  sentinel:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2.0
    ammoConsumption: 3
    count: 6 # Sentinels spawned.
    interval: 0.2 # Delay between each sentinel becoming ready to fire.
    damageFactor: 0.5
    detectionRange: 24 # Target search range.
    hoverDistance: 2.0 # Forward hover distance from owner.
    hoverHeight: 4 # Vertical hover offset.
    hoverElevationAngle: 0 # 0 keeps the hover axis horizontal; 90 moves it overhead and makes the orbit plane horizontal.
    orbitRadius: 2 # Orbit radius around the hover point.
    orbitSpeed: 90 # Orbit degrees per second.
    attackDelay: 2 # Delay before a sentinel can fire.
    lifetime: 12 # Sentinel lifetime seconds.

  meteor:
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 3
    count: 6
    interval: 0.5
    projectileSpeedFactor: 0.5
    projectileScaleFactor: 3.0
    damageFactor: 0.5
    meteorRadius: 6 # Random impact radius around the aimed point.
    aoeRadiusFactor: 1.2 # Impact AOE and effect scale multiplier.
    meteorSpawnHeight: 16 # Spawn height above the aimed point.

  burst: # Each repeated shot uses the weapon's full primary projectile pattern; count controls repeat shots.
    animation: ""
    cooldown: 8.0
    cooldownReductionFactor: 0.5
    durabilityFactor: 2
    resourceMultiplier: 2
    ammoConsumption: 1
    count: 3 # Repeated firing animations.
    interval: 0.45 # Delay between repeated firing animations.
    damageFactor: 0.7

  stickyDetonator:
    detonateAnimation: emote_blowkiss # Optional animation trigger played when manually detonating active charges.
    maxCharges: 5 # Max active charges before oldest charges are removed.
    lifetime: 30 # Charge lifetime seconds.

  overchargedBomb:
    ammoConsumption: 3
    damageFactor: 2.0
    aoeRadiusFactor: 1.5 # Impact AOE and effect scale multiplier.

